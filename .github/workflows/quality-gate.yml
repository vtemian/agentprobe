name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - run: npm ci

      - name: Biome check
        run: npx biome check .

      - name: ESLint
        run: npx eslint . --max-warnings 0

      - name: TypeScript
        run: npm run typecheck

      - name: Tests
        run: npm run test
